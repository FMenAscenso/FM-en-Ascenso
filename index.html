<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FM en Ascenso</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f8;
color:#111;
}

header{
background:#0d1117;
color:#4fc3f7;
padding:18px 25px;
font-size:30px;
font-weight:bold;
border-bottom:3px solid #4fc3f7;
}

.sub{
font-size:13px;
color:#9fb3c8;
margin-top:4px;
}

.layout{
display:grid;
grid-template-columns:250px 1fr 300px;
min-height:100vh;
}

/* LEFT */
.sidebar{
background:#ffffff;
border-right:1px solid #dfe3e8;
padding:20px;
}

.sidebar h3{
font-size:18px;
margin-bottom:14px;
color:#0d1117;
}

.sidebar a{
display:block;
text-decoration:none;
color:#111;
padding:10px 12px;
border-radius:8px;
margin-bottom:8px;
font-size:15px;
transition:.2s;
background:#f3f5f7;
}

.sidebar a:hover{
background:#4fc3f7;
color:#000;
}

/* CENTER */
.main{
padding:20px;
}

.box{
background:#fff;
border:1px solid #dde3ea;
border-radius:12px;
padding:16px;
margin-bottom:18px;
}

.box h2{
font-size:20px;
margin-bottom:12px;
color:#0d1117;
}

.match{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-bottom:1px solid #edf1f5;
font-size:15px;
}

.match:last-child{
border-bottom:none;
}

.live{
color:#00b050;
font-weight:bold;
font-size:13px;
}
